name: CodeQL

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual

    steps:
    - name: Install dependencies
      run : |
        sudo apt-get update
        sudo apt-get install -y libssl-dev libbz2-dev liblzma-dev libexpat1-dev zlib1g-dev

    - name: Install HTS lib 1.13
      run: |
        cd /tmp
        wget https://github.com/samtools/htslib/releases/download/1.13/htslib-1.13.tar.bz2
        tar -xf htslib-1.13.tar.bz2
        cd htslib-1.13
        ./configure --prefix=/usr/local
        make
        sudo make install && sudo ldconfig

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual

    - if: ${{ matrix.build-mode == 'manual' }}
      name: Build C and C++ code
      env:
        HTSLIB_DIR: /usr/local
      run: perl Makefile.PL && make

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

